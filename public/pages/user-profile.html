<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BICpES — User Profile</title>
    <link rel="stylesheet" type="text/css" href="../styles/design.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        
        .content-wrap {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        
        .profile-card {
            background: rgba(30,30,30,0.8);
            border: 1px solid rgba(155,70,212,0.20);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #9b46d4, #cc88f5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .profile-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        
        .profile-id {
            font-size: 13px;
            color: rgba(155,70,212,0.80);
            margin-bottom: 30px;
        }
        
        .profile-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: rgba(155,70,212,0.08);
            border: 1px solid rgba(155,70,212,0.15);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            color: inherit;
            font-family: 'Manrope', sans-serif;
        }
        
        .menu-item:hover {
            background: rgba(155,70,212,0.15);
            border-color: rgba(155,70,212,0.30);
            transform: translateX(4px);
        }
        
        .menu-item.logout:hover {
            background: rgba(248,113,113,0.15);
            border-color: rgba(248,113,113,0.30);
        }
        
        .item-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        
        .item-label {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        
        .item-sub {
            font-size: 12px;
            color: rgba(245,245,245,0.60);
        }
        
        .menu-item.logout .item-label {
            color: #f87171;
        }
        
        .menu-item.logout .item-sub {
            color: rgba(248,113,113,0.70);
        }
        
        .menu-chevron {
            font-size: 18px;
            color: rgba(155,70,212,0.60);
        }
        
        .menu-item.logout .menu-chevron {
            color: transparent;
        }
        
        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.open {
            display: flex;
        }
        
        .modal-box {
            background: rgba(30,30,30,0.9);
            border: 1px solid rgba(155,70,212,0.20);
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from { transform: scale(0.95) translateY(-20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        
        .modal-header {
            padding: 24px;
            border-bottom: 1px solid rgba(155,70,212,0.15);
            display: flex;
            align-items: flex-start;
            gap: 16px;
            justify-content: space-between;
        }
        
        .modal-icon {
            width: 36px;
            height: 36px;
            background: rgba(155,70,212,0.15);
            border: 1px solid rgba(155,70,212,0.25);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        
        .modal-subtitle {
            font-size: 12px;
            color: rgba(245,245,245,0.60);
        }
        
        .modal-close {
            width: 32px;
            height: 32px;
            background: rgba(155,70,212,0.10);
            border: 1px solid rgba(155,70,212,0.20);
            border-radius: 50%;
            color: rgba(155,70,212,0.80);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .modal-close:hover {
            background: rgba(155,70,212,0.20);
            transform: rotate(90deg);
        }
        
        .modal-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .field-label {
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 700;
            color: rgba(155,70,212,0.90);
        }
        
        .field-input, .field-select {
            padding: 11px 14px;
            background: rgba(20,20,20,0.6);
            border: 1.5px solid rgba(155,70,212,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            font-family: 'Manrope', sans-serif;
            outline: none;
            transition: all 0.2s;
        }
        
        .field-input:focus, .field-select:focus {
            border-color: rgba(155,70,212,0.40);
            box-shadow: 0 0 0 3px rgba(155,70,212,0.10);
        }
        
        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .toggle-eye {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: rgba(155,70,212,0.60);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .toggle-eye:hover {
            color: rgba(155,70,212,0.90);
        }
        
        .eye-icon {
            width: 18px;
            height: 18px;
        }
        
        .modal-footer {
            padding: 18px 24px;
            border-top: 1px solid rgba(155,70,212,0.15);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .btn-secondary, .btn-primary {
            padding: 10px 22px;
            border-radius: 10px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-secondary {
            background: rgba(155,70,212,0.10);
            color: rgba(155,70,212,0.80);
            border: 1px solid rgba(155,70,212,0.20);
        }
        
        .btn-secondary:hover {
            background: rgba(155,70,212,0.15);
            color: #cc88f5;
        }
        
        .btn-primary {
            background: #9b46d4;
            color: #fff;
            border: 1px solid rgba(155,70,212,0.50);
        }
        
        .btn-primary:hover {
            background: #b060e8;
            box-shadow: 0 0 16px rgba(155,70,212,0.35);
            transform: translateY(-1px);
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #9b46d4;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin: 20px;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav>
        <a href="../index.html" class="left-side"><img src="../images/Logo/BICpES Learning Hub Logo.png" alt="Logo"></a>
        <div class="center">
            <a href="../index.html">About Us</a>
            <a href="topics.html">Topics</a>
            <a href="projects.html">Projects</a>
            <a href="#tools">Tools</a>
        </div>
        <div class="right-side" id="navRight">
            <!-- Dynamically populated by nav.js -->
        </div>
    </nav>

    <div class="content-wrap">
        <div class="profile-card">
            <div class="profile-avatar">👤</div>
            <div class="profile-name" id="profileName">Loading...</div>
            <div class="profile-id" id="profileId">Student Number</div>

            <div class="profile-menu">
                <button class="menu-item" id="editBtn">
                    <div class="item-text">
                        <span class="item-label">Edit Information</span>
                        <span class="item-sub">Update your profile details</span>
                    </div>
                    <span class="menu-chevron">›</span>
                </button>

                <button class="menu-item" id="passwordBtn">
                    <div class="item-text">
                        <span class="item-label">Change Password</span>
                        <span class="item-sub">Update your credentials</span>
                    </div>
                    <span class="menu-chevron">›</span>
                </button>

                <button class="menu-item logout" id="logoutBtn">
                    <div class="item-text">
                        <span class="item-label">Logout</span>
                        <span class="item-sub">Sign out of your account</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <div class="modal-header">
                <div>
                    <div class="modal-title">Edit Information</div>
                    <div class="modal-subtitle">Update your profile details below</div>
                </div>
                <button class="modal-close" id="editClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="field-group">
                    <label class="field-label">Student Number</label>
                    <input class="field-input" type="text" id="editStudentNum" placeholder="e.g. 2321000">
                </div>
                <div class="field-row">
                    <div class="field-group">
                        <label class="field-label">Last Name</label>
                        <input class="field-input" type="text" id="editLastName" placeholder="Last Name">
                    </div>
                    <div class="field-group">
                        <label class="field-label">First Name</label>
                        <input class="field-input" type="text" id="editFirstName" placeholder="First Name">
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label">Date of Birth</label>
                    <input class="field-input" type="date" id="editBirthdate">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="editCancel">Cancel</button>
                <button class="btn-primary" id="editSave">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-box">
            <div class="modal-header">
                <div>
                    <div class="modal-title">Change Password</div>
                    <div class="modal-subtitle">Keep your account secure</div>
                </div>
                <button class="modal-close" id="passwordClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="field-group">
                    <label class="field-label">Current Password</label>
                    <div class="input-wrap">
                        <input class="field-input" type="password" id="currentPass" placeholder="Enter current password" style="width: 100%; padding-right: 40px;">
                        <button class="toggle-eye" type="button" data-target="currentPass">👁</button>
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label">New Password</label>
                    <div class="input-wrap">
                        <input class="field-input" type="password" id="newPass" placeholder="Enter new password" style="width: 100%; padding-right: 40px;">
                        <button class="toggle-eye" type="button" data-target="newPass">👁</button>
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label">Confirm New Password</label>
                    <div class="input-wrap">
                        <input class="field-input" type="password" id="confirmPass" placeholder="Confirm new password" style="width: 100%; padding-right: 40px;">
                        <button class="toggle-eye" type="button" data-target="confirmPass">👁</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="passwordCancel">Cancel</button>
                <button class="btn-primary" id="passwordSave">Update Password</button>
            </div>
        </div>
    </div>

    <a href="../index.html" class="back-link">← Back to Home</a>

    <footer class="footer">
        <p>@ 2026 BICpES Learning Hub | Do not share my personal information</p>
        <div class="links">
            <a href="https://www.facebook.com/BICpES" target="_blank"><strong>Facebook</strong></a>
        </div>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
    <script>
        // Check if user is logged in
        if (!isLoggedIn()) {
            window.location.href = '../index.html#login';
        }

        const user = getCurrentUser();

        // Display user info
        document.getElementById('profileName').textContent = `${user.first_name} ${user.last_name}`;
        document.getElementById('profileId').textContent = `Student No. ${user.student_number}`;

        // Edit modal
        const editModal = document.getElementById('editModal');
        document.getElementById('editBtn').addEventListener('click', () => {
            document.getElementById('editStudentNum').value = user.student_number;
            document.getElementById('editLastName').value = user.last_name;
            document.getElementById('editFirstName').value = user.first_name;
            document.getElementById('editBirthdate').value = user.birthdate || '';
            editModal.classList.add('open');
        });

        document.getElementById('editClose').addEventListener('click', () => {
            editModal.classList.remove('open');
        });

        document.getElementById('editCancel').addEventListener('click', () => {
            editModal.classList.remove('open');
        });

        document.getElementById('editSave').addEventListener('click', () => {
            alert('Profile update functionality would be implemented here');
            editModal.classList.remove('open');
        });

        // Password modal
        const passwordModal = document.getElementById('passwordModal');
        document.getElementById('passwordBtn').addEventListener('click', () => {
            passwordModal.classList.add('open');
        });

        document.getElementById('passwordClose').addEventListener('click', () => {
            passwordModal.classList.remove('open');
        });

        document.getElementById('passwordCancel').addEventListener('click', () => {
            passwordModal.classList.remove('open');
        });

        document.getElementById('passwordSave').addEventListener('click', () => {
            alert('Password change functionality would be implemented here');
            passwordModal.classList.remove('open');
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            logout();
            window.location.href = '../index.html';
        });

        // Toggle password visibility
        document.querySelectorAll('.toggle-eye').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = btn.dataset.target;
                const input = document.getElementById(targetId);
                input.type = input.type === 'password' ? 'text' : 'password';
            });
        });

        // Close modals on overlay click
        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) editModal.classList.remove('open');
        });

        passwordModal.addEventListener('click', (e) => {
            if (e.target === passwordModal) passwordModal.classList.remove('open');
        });
    </script>
</body>
</html>
